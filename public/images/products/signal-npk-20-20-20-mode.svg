<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Signal NPK 20-20-20 balanced growth support</title>
  <desc id="desc">Balanced NPK support for vegetative growth, roots, and crop strength.</desc>
  <rect width="900" height="900" fill="#f4f7f5"/>
  <circle cx="450" cy="450" r="330" fill="#ffffff" stroke="#d8e5dc" stroke-width="6"/>
  <circle cx="450" cy="450" r="225" fill="#e8f3ec" stroke="#b8d6c1" stroke-width="4"/>
  <circle cx="450" cy="450" r="112" fill="#0a8f3c" opacity="0.95"/>
  <text x="450" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="58" font-weight="700" fill="#111833">Signal NPK</text>
  <text x="450" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff">20-20-20</text>
  <text x="450" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#111833">Balanced Formula</text>
  <g font-family="Arial, sans-serif" font-weight="700" font-size="28" fill="#111833">
    <text x="450" y="140" text-anchor="middle">Vegetative Growth</text>
    <text x="170" y="705" text-anchor="middle">Root Activity</text>
    <text x="730" y="705" text-anchor="middle">Crop Strength</text>
  </g>
  <g stroke="#0a8f3c" stroke-width="10" stroke-linecap="round" fill="none">
    <path d="M450 245 L450 325"/>
    <path d="M285 635 L370 540"/>
    <path d="M615 635 L530 540"/>
  </g>
  <g fill="#f6b331">
    <circle cx="450" cy="230" r="16"/>
    <circle cx="270" cy="650" r="16"/>
    <circle cx="630" cy="650" r="16"/>
  </g>
</svg>
